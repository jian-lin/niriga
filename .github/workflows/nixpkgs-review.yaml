name: nixpkgs-review
run-name: nixpkgs-review pr ${{ inputs.pr }}${{ inputs.extra-args && format(' {0}', inputs.extra-args) || '' }}
on:
  workflow_dispatch:
    inputs:
      pr:
        description: Run nixpkgs-review against this PR number
        required: true
        type: string
      extra-args:
        description: Extra args passed to nixpkgs-review
        required: false
        type: string
concurrency:
  group: ${{ github.workflow }}-${{ inputs.pr }}
  cancel-in-progress: true
permissions: {}
env:
  reportDir: niriga-report-dir
jobs:
  nixpkgs-review:
    name: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          repository: NixOS/nixpkgs
          ref: refs/heads/nixpkgs-unstable
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
      - run: mkdir -v "$reportDir"
      # TODO remove "echo >> report.md" when we have nixpkgs-review#655
      - run: |
          nix run -f . nixpkgs-review -- pr "${pr}" \
            --eval github \
            --checkout merge \
            --print-result \
            --run "echo >> report.md && cp -v report.md $GITHUB_WORKSPACE/$reportDir/" \
            ${extraArgs:+"$extraArgs"}
        env:
          pr: ${{ inputs.pr }}
          extraArgs: ${{ inputs.extra-args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Show report
        run: cat "$reportDir"/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Upload report
        with:
          name: nixpkgs-review-report-${{ matrix.runner }}
          path: ${{ env.reportDir }}/report.md
  show-reports:
    name: Show reports
    runs-on: ubuntu-latest
    needs: [nixpkgs-review]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        name: Download reports
        with:
          path: ${{ env.reportDir }}
      - name: Show reports
        run: cat "$reportDir"/*/*
